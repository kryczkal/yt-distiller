<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YouTube Distiller — Settings</title>
  <style>
    body { font: 14px/1.6 -apple-system, system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #1a1a1e; }
    @media (prefers-color-scheme: dark) { body { background: #0f0f10; color: #e9e9ec; } input { background: #18181b; color: #e9e9ec; border-color: #2a2a30; } }
    h1 { font-size: 20px; }
    label { display: block; margin: 18px 0 4px; font-weight: 600; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
    .hint { color: #888; font-size: 12px; margin-top: 4px; }
    button { margin-top: 22px; padding: 9px 18px; border: 0; border-radius: 6px; background: #7c3aed; color: #fff; font-weight: 600; cursor: pointer; }
    #saved { color: #16a34a; margin-left: 12px; font-size: 13px; }
    code { background: rgba(127,127,127,.18); padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>✦ YouTube Distiller — Settings</h1>
  <p>The extension talks to a local backend that runs on your Claude subscription.</p>

  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" type="text" placeholder="http://127.0.0.1:8765" />
  <div class="hint">Default <code>http://127.0.0.1:8765</code>. Change only if you set a different port.</div>

  <label for="token">Shared token</label>
  <input id="token" type="text" spellcheck="false" placeholder="paste the token the backend printed on startup" />
  <div class="hint">The backend prints <code>token: …</code> when it starts (or read <code>~/.config/yt-distill/token</code>).</div>

  <div>
    <button id="save">Save</button>
    <span id="saved"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
